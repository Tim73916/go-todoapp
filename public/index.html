<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ToDoApp</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: #0a0a0f;
            background-image:
                radial-gradient(ellipse at 10% 20%, rgba(99, 102, 241, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 90% 80%, rgba(139, 92, 246, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(0, 0, 0, 0.5) 0%, transparent 100%);
            color: #fff;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .app {
            max-width: 1280px;
            width: 100%;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 28px;
            margin-bottom: 24px;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            animation: slideDown 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 14px;
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        .logo span:first-of-type {
            background: linear-gradient(135deg, #818cf8, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo-icon {
            width: 42px;
            height: 42px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: #ffffff;
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.3);
            transition: transform 0.3s ease;
        }

        .logo-icon:hover {
            transform: rotate(-10deg) scale(1.05);
        }

        .badge {
            font-size: 0.6rem;
            font-weight: 600;
            background: rgba(99, 102, 241, 0.2);
            color: #818cf8;
            padding: 4px 14px;
            border-radius: 40px;
            letter-spacing: 0.04em;
            border: 1px solid rgba(99, 102, 241, 0.1);
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 10px 22px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: inherit;
            position: relative;
            overflow: hidden;
        }

        .btn i {
            font-size: 0.9rem;
            transition: transform 0.3s ease;
        }

        .btn:hover i {
            transform: scale(1.1);
        }

        .btn-primary {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            box-shadow: 0 4px 16px rgba(99, 102, 241, 0.3);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(99, 102, 241, 0.4);
        }

        .btn-success {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            box-shadow: 0 4px 16px rgba(16, 185, 129, 0.3);
        }
        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(16, 185, 129, 0.4);
        }

        .btn-ghost {
            background: rgba(255, 255, 255, 0.05);
            color: #94a3b8;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        .btn-ghost:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
        }

        .btn-ghost:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none !important;
        }

        .btn-sm {
            padding: 6px 14px;
            font-size: 0.75rem;
            border-radius: 8px;
        }

        .btn-icon {
            width: 36px;
            height: 36px;
            padding: 0;
            justify-content: center;
            border-radius: 10px;
        }

        .tabs {
            display: flex;
            gap: 4px;
            padding: 4px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            margin-bottom: 24px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            animation: fadeIn 0.6s ease 0.2s both;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .tab {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 12px;
            background: transparent;
            color: #64748b;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-family: inherit;
        }

        .tab i {
            font-size: 1rem;
            transition: transform 0.3s ease;
        }

        .tab:hover {
            color: #e2e8f0;
            background: rgba(255, 255, 255, 0.03);
        }

        .tab:hover i {
            transform: translateY(-2px);
        }

        .tab.active {
            background: rgba(99, 102, 241, 0.15);
            color: #818cf8;
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.05);
        }

        .tab-badge {
            background: rgba(99, 102, 241, 0.15);
            padding: 2px 10px;
            border-radius: 40px;
            font-size: 0.7rem;
            color: #818cf8;
        }

        .tab.active .tab-badge {
            background: rgba(99, 102, 241, 0.2);
        }

        .panel {
            display: none;
            animation: fadeSlide 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .panel.active {
            display: block;
        }

        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card {
            padding: 24px 28px;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        .card:hover {
            border-color: rgba(99, 102, 241, 0.08);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
        }

        .card-header h2 {
            font-size: 1.1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #e2e8f0;
        }

        .card-header h2 i {
            color: #818cf8;
        }

        .card-badge {
            background: rgba(255, 255, 255, 0.04);
            padding: 4px 16px;
            border-radius: 40px;
            font-size: 0.75rem;
            color: #94a3b8;
            transition: all 0.3s ease;
        }

        .filters {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px;
            padding: 12px 18px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 14px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px 4px 8px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: all 0.3s ease;
        }

        .filter-group:focus-within {
            border-color: rgba(99, 102, 241, 0.3);
            background: rgba(255, 255, 255, 0.05);
        }

        .filter-group i {
            color: #64748b;
            font-size: 0.7rem;
        }

        .filter-group:focus-within i {
            color: #818cf8;
        }

        .filter-group input,
        .filter-group select {
            padding: 6px 8px;
            border: none;
            background: transparent;
            color: #e2e8f0;
            font-size: 0.8rem;
            font-family: inherit;
            max-width: 90px;
            outline: none;
        }

        .filter-group input::placeholder {
            color: #475569;
        }

        .filter-group input[type="number"] {
            max-width: 70px;
        }

        .pagination {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-left: auto;
            padding: 4px 8px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        .pagination-info {
            font-size: 0.7rem;
            color: #94a3b8;
            min-width: 100px;
            text-align: center;
            font-weight: 500;
        }

        .list {
            max-height: 480px;
            overflow-y: auto;
            padding-right: 4px;
        }

        .list::-webkit-scrollbar {
            width: 4px;
        }
        .list::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 10px;
        }
        .list::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.06);
            border-radius: 10px;
        }

        .item {
            padding: 14px 18px;
            margin-bottom: 8px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            animation: itemAppear 0.4s cubic-bezier(0.4, 0, 0.2, 1) both;
        }

        .item:nth-child(1) { animation-delay: 0.05s; }
        .item:nth-child(2) { animation-delay: 0.1s; }
        .item:nth-child(3) { animation-delay: 0.15s; }
        .item:nth-child(4) { animation-delay: 0.2s; }
        .item:nth-child(5) { animation-delay: 0.25s; }
        .item:nth-child(6) { animation-delay: 0.3s; }
        .item:nth-child(7) { animation-delay: 0.35s; }
        .item:nth-child(8) { animation-delay: 0.4s; }
        .item:nth-child(9) { animation-delay: 0.45s; }
        .item:nth-child(10) { animation-delay: 0.5s; }

        @keyframes itemAppear {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .item:hover {
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(99, 102, 241, 0.1);
            transform: translateX(4px);
        }

        .item-content {
            flex: 1;
            min-width: 140px;
        }

        .item-title {
            font-weight: 600;
            font-size: 0.95rem;
            color: #e2e8f0;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .item-meta {
            font-size: 0.75rem;
            color: #64748b;
            display: flex;
            flex-wrap: wrap;
            gap: 6px 14px;
            margin-top: 4px;
        }

        .item-meta i {
            width: 14px;
            margin-right: 4px;
        }

        .item-actions {
            display: flex;
            gap: 6px;
        }

        .item-actions .btn {
            opacity: 0.6;
            transition: all 0.3s ease;
        }

        .item:hover .item-actions .btn {
            opacity: 1;
        }

        .pill {
            padding: 2px 12px;
            border-radius: 40px;
            font-size: 0.65rem;
            font-weight: 600;
            display: inline-block;
        }
        .pill-purple {
            background: rgba(99, 102, 241, 0.15);
            color: #818cf8;
        }
        .pill-green {
            background: rgba(16, 185, 129, 0.15);
            color: #34d399;
        }
        .pill-gray {
            background: rgba(255, 255, 255, 0.04);
            color: #64748b;
        }

        .empty {
            text-align: center;
            padding: 50px 0;
            color: #475569;
        }
        .empty i {
            font-size: 3rem;
            display: block;
            margin-bottom: 14px;
            opacity: 0.2;
        }
        .empty p {
            font-size: 0.9rem;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 16px;
        }

        .stat {
            text-align: center;
            padding: 20px 16px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition: all 0.3s ease;
        }

        .stat:hover {
            transform: translateY(-4px);
            border-color: rgba(99, 102, 241, 0.1);
        }

        .stat-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: #64748b;
        }

        .stat-value {
            font-weight: 700;
            font-size: 2rem;
            color: #e2e8f0;
            margin-top: 4px;
            transition: all 0.3s ease;
        }

        .stat:hover .stat-value {
            color: #818cf8;
        }

        .stat-value small {
            font-weight: 400;
            font-size: 1rem;
            color: #64748b;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(16px);
            align-items: center;
            justify-content: center;
            z-index: 1000;
            animation: fadeIn 0.3s ease;
        }
        .modal-overlay.active {
            display: flex;
        }

        .modal {
            width: 100%;
            max-width: 440px;
            padding: 32px 36px;
            background: rgba(20, 20, 30, 0.95);
            backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 24px;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.6);
            animation: slideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal h3 {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #e2e8f0;
        }
        .modal h3 i {
            color: #818cf8;
        }

        .modal label {
            font-size: 0.75rem;
            font-weight: 500;
            color: #94a3b8;
            display: block;
            margin: 14px 0 4px;
        }

        .modal input,
        .modal textarea,
        .modal select {
            width: 100%;
            padding: 10px 16px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            background: rgba(255, 255, 255, 0.03);
            color: #e2e8f0;
            font-size: 0.9rem;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        .modal input:focus,
        .modal textarea:focus {
            outline: none;
            border-color: rgba(99, 102, 241, 0.3);
            background: rgba(255, 255, 255, 0.05);
        }

        .modal textarea {
            min-height: 70px;
            resize: vertical;
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 24px;
        }

        .btn-ghost-dark {
            padding: 10px 28px;
            border: none;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.04);
            color: #94a3b8;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }
        .btn-ghost-dark:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #e2e8f0;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 14px 28px;
            border-radius: 14px;
            font-weight: 500;
            font-size: 0.85rem;
            background: rgba(20, 20, 30, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: #e2e8f0;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.4);
            z-index: 2000;
            opacity: 0;
            transform: translateY(20px) scale(0.95);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .toast.show {
            opacity: 1;
            transform: translateY(0) scale(1);
        }
        .toast.success { border-color: rgba(16, 185, 129, 0.2); }
        .toast.success i { color: #34d399; }
        .toast.error { border-color: rgba(239, 68, 68, 0.2); }
        .toast.error i { color: #f87171; }
        .toast.info { border-color: rgba(99, 102, 241, 0.2); }
        .toast.info i { color: #818cf8; }

        @media (max-width: 768px) {
            body { padding: 12px; }
            .header { flex-direction: column; align-items: stretch; gap: 14px; padding: 16px 20px; }
            .header-actions { flex-wrap: wrap; }
            .header-actions .btn { flex: 1; justify-content: center; }
            .tabs { flex-wrap: wrap; border-radius: 12px; }
            .tab { flex: 1; min-width: 80px; padding: 10px 14px; font-size: 0.8rem; }
            .card { padding: 16px 18px; }
            .filters { flex-direction: column; align-items: stretch; }
            .filter-group { max-width: 100%; }
            .filter-group input, .filter-group select { max-width: 100%; flex: 1; }
            .pagination { margin-left: 0; justify-content: center; }
            .stats { grid-template-columns: 1fr 1fr; }
            .modal { margin: 16px; padding: 24px; }
        }

        @media (max-width: 480px) {
            .stats { grid-template-columns: 1fr; }
            .tab span { display: none; }
            .tab i { font-size: 1.2rem; }
            .header-actions .btn span { display: none; }
            .item { flex-direction: column; align-items: stretch; }
            .item-actions { justify-content: flex-end; }
            .pagination-info { min-width: 70px; font-size: 0.65rem; }
        }
    </style>
</head>
<body>

    <div class="app">
        <!-- HEADER -->
        <header class="header">
            <div class="logo">
                <div class="logo-icon"><i class="fas fa-bolt"></i></div>
                <span>TodoApp</span>
                <span class="badge">v1</span>
            </div>
            <div class="header-actions">
                <button class="btn btn-primary" id="btnCreateTask">
                    <i class="fas fa-plus"></i> <span>Задача</span>
                </button>
                <button class="btn btn-success" id="btnCreateUser">
                    <i class="fas fa-user-plus"></i> <span>Пользователь</span>
                </button>
                <button class="btn btn-ghost btn-icon" id="btnRefresh" title="Обновить (Ctrl+R)">
                    <i class="fas fa-sync-alt"></i>
                </button>
            </div>
        </header>

        <!-- TABS -->
        <nav class="tabs">
            <button class="tab active" data-tab="tasks">
                <i class="fas fa-tasks"></i>
                <span>Задачи</span>
                <span class="tab-badge" id="badgeTasks">0</span>
            </button>
            <button class="tab" data-tab="users">
                <i class="fas fa-users"></i>
                <span>Пользователи</span>
                <span class="tab-badge" id="badgeUsers">0</span>
            </button>
            <button class="tab" data-tab="stats">
                <i class="fas fa-chart-pie"></i>
                <span>Статистика</span>
            </button>
        </nav>

       
        <section id="panel-tasks" class="panel active">
            <div class="card">
                <div class="card-header">
                    <h2><i class="fas fa-list-ul"></i> Все задачи</h2>
                    <span class="card-badge" id="countTasks">0</span>
                </div>
                <div class="filters">
                    <div class="filter-group">
                        <i class="fas fa-user"></i>
                        <input type="number" id="filterUserId" placeholder="ID автора" />
                    </div>
                    <div class="filter-group">
                        <i class="fas fa-grip-lines"></i>
                        <select id="taskLimit">
                            <option value="5">5</option>
                            <option value="10" selected>10</option>
                            <option value="20">20</option>
                            <option value="50">50</option>
                        </select>
                    </div>
                    <button class="btn btn-ghost btn-sm" id="btnApplyTaskFilter">
                        <i class="fas fa-sliders-h"></i>
                    </button>
                    <button class="btn btn-ghost btn-sm" id="btnRefreshTasks">
                        <i class="fas fa-rotate-right"></i>
                    </button>
                    <div class="pagination">
                        <button class="btn btn-ghost btn-sm" id="btnTaskPrev" disabled>
                            <i class="fas fa-chevron-left"></i>
                        </button>
                        <span class="pagination-info" id="taskPaginationInfo">Страница 1 из 0</span>
                        <button class="btn btn-ghost btn-sm" id="btnTaskNext">
                            <i class="fas fa-chevron-right"></i>
                        </button>
                    </div>
                </div>
                <div class="list" id="taskList">
                    <div class="empty"><i class="fas fa-inbox"></i><p>Нет задач</p></div>
                </div>
            </div>
        </section>

      
        <section id="panel-users" class="panel">
            <div class="card">
                <div class="card-header">
                    <h2><i class="fas fa-user-group"></i> Все пользователи</h2>
                    <span class="card-badge" id="countUsers">0</span>
                </div>
                <div class="filters">
                    <div class="filter-group">
                        <i class="fas fa-grip-lines"></i>
                        <select id="userLimit">
                            <option value="5">5</option>
                            <option value="10" selected>10</option>
                            <option value="20">20</option>
                            <option value="50">50</option>
                        </select>
                    </div>
                    <button class="btn btn-ghost btn-sm" id="btnApplyUserFilter">
                        <i class="fas fa-sliders-h"></i>
                    </button>
                    <button class="btn btn-ghost btn-sm" id="btnRefreshUsers">
                        <i class="fas fa-rotate-right"></i>
                    </button>
                    <div class="pagination">
                        <button class="btn btn-ghost btn-sm" id="btnUserPrev" disabled>
                            <i class="fas fa-chevron-left"></i>
                        </button>
                        <span class="pagination-info" id="userPaginationInfo">Страница 1 из 0</span>
                        <button class="btn btn-ghost btn-sm" id="btnUserNext">
                            <i class="fas fa-chevron-right"></i>
                        </button>
                    </div>
                </div>
                <div class="list" id="userList">
                    <div class="empty"><i class="fas fa-user-slash"></i><p>Нет пользователей</p></div>
                </div>
            </div>
        </section>

        
        <section id="panel-stats" class="panel">
            <div class="card">
                <div class="card-header">
                    <h2><i class="fas fa-chart-simple"></i> Статистика</h2>
                    <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
                        <input type="date" id="statFrom" style="padding:6px 14px;border-radius:10px;border:1px solid rgba(255,255,255,0.06);background:rgba(255,255,255,0.03);color:#e2e8f0;" />
                        <input type="date" id="statTo" style="padding:6px 14px;border-radius:10px;border:1px solid rgba(255,255,255,0.06);background:rgba(255,255,255,0.03);color:#e2e8f0;" />
                        <button class="btn btn-ghost btn-sm" id="btnApplyStats"><i class="fas fa-calendar"></i></button>
                        <button class="btn btn-ghost btn-sm" id="btnRefreshStats"><i class="fas fa-rotate-right"></i></button>
                    </div>
                </div>
                <div class="stats" id="statsDisplay">
                    <div class="stat"><div class="stat-label">Создано</div><div class="stat-value" id="statCreated">—</div></div>
                    <div class="stat"><div class="stat-label">Выполнено</div><div class="stat-value" id="statCompleted">—</div></div>
                    <div class="stat"><div class="stat-label">Прогресс</div><div class="stat-value" id="statRate">—<small>%</small></div></div>
                    <div class="stat"><div class="stat-label">Среднее время</div><div class="stat-value" id="statAvgTime" style="font-size:1.2rem;">—</div></div>
                </div>
                <div style="margin-top:16px;font-size:0.75rem;color:#475569;">
                    <i class="fas fa-info-circle"></i> Данные за выбранный период
                </div>
            </div>
        </section>
    </div>

  
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h3 id="modalTitle"><i class="fas fa-pen"></i> Новая задача</h3>
            <form id="modalForm">
                <div id="modalBody"></div>
                <div class="modal-actions">
                    <button type="button" class="btn-ghost-dark" id="btnModalCancel">Отмена</button>
                    <button type="submit" class="btn btn-primary" id="btnModalSubmit"><i class="fas fa-save"></i> Сохранить</button>
                </div>
            </form>
        </div>
    </div>

    
    <div id="toast" class="toast"></div>

    <script>
       
        const API = {
            base: '/api/v1',

            async request(endpoint, opts = {}) {
                const url = this.base + endpoint;
                const res = await fetch(url, {
                    headers: { 'Content-Type': 'application/json' },
                    ...opts,
                });
                if (!res.ok) {
                    let msg = `${res.status} ${res.statusText}`;
                    try { const d = await res.json();
                        msg = d.message || d.error || msg; } catch (_) {}
                    throw new Error(msg);
                }
                if (res.status === 204) return null;
                return res.json();
            },

            qs(params) {
                const q = new URLSearchParams();
                Object.keys(params).forEach(k => {
                    if (params[k] !== undefined && params[k] !== '' && params[k] !== null)
                        q.append(k, params[k]);
                });
                return q.toString();
            },

            getTasks(userId, limit = 10, offset = 0) {
                const q = this.qs({ user_id: userId, limit, offset });
                return this.request(`/tasks${q ? '?' + q : ''}`);
            },
            createTask(data) { return this.request('/tasks', { method: 'POST', body: JSON.stringify(data) }); },
            updateTask(id, data) { return this.request(`/tasks/${id}`, { method: 'PATCH', body: JSON.stringify(data) }); },
            deleteTask(id) { return this.request(`/tasks/${id}`, { method: 'DELETE' }); },

            getUsers(limit = 10, offset = 0) {
                const q = this.qs({ limit, offset });
                return this.request(`/users${q ? '?' + q : ''}`);
            },
            createUser(data) { return this.request('/users', { method: 'POST', body: JSON.stringify(data) }); },
            updateUser(id, data) { return this.request(`/users/${id}`, { method: 'PATCH', body: JSON.stringify(data) }); },
            deleteUser(id) { return this.request(`/users/${id}`, { method: 'DELETE' }); },

            getStats(from, to) {
                const q = this.qs({ from, to });
                return this.request(`/statistics${q ? '?' + q : ''}`);
            }
        };

        
        const App = {
            tasks: [],
            users: [],

            taskPage: 1,
            taskLimit: 10,
            taskTotal: 0,

            userPage: 1,
            userLimit: 10,
            userTotal: 0,

            $: id => document.getElementById(id),
            $$: sel => document.querySelectorAll(sel),

            toast(msg, type = 'success') {
                const el = this.$('toast');
                const icon = type === 'success' ? 'fa-check-circle' : type === 'error' ? 'fa-exclamation-circle' :
                'fa-info-circle';
                el.innerHTML = `<i class="fas ${icon}"></i> ${msg}`;
                el.className = `toast ${type}`;
                requestAnimationFrame(() => el.classList.add('show'));
                clearTimeout(this._toastTimer);
                this._toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
            },

            async fetchTasks() {
                try {
                    const uid = this.$('filterUserId')?.value || '';
                    const limit = parseInt(this.$('taskLimit')?.value) || 10;
                    const offset = (this.taskPage - 1) * limit;
                    this.taskLimit = limit;
                    const data = await API.getTasks(uid || null, limit, offset);
                    this.tasks = data || [];
                    this.taskTotal = this.tasks.length < limit ? offset + this.tasks.length : offset + limit + 1;
                    this.renderTasks();
                    this.updatePagination('task');
                } catch (e) { this.toast(e.message, 'error'); }
            },

            async fetchUsers() {
                try {
                    const limit = parseInt(this.$('userLimit')?.value) || 10;
                    const offset = (this.userPage - 1) * limit;
                    this.userLimit = limit;
                    const data = await API.getUsers(limit, offset);
                    this.users = data || [];
                    this.userTotal = this.users.length < limit ? offset + this.users.length : offset + limit + 1;
                    this.renderUsers();
                    this.updatePagination('user');
                } catch (e) { this.toast(e.message, 'error'); }
            },

            async fetchStats(from, to) {
                try {
                    const s = await API.getStats(from, to);
                    this.$('statCreated').textContent = s.tasks_created ?? '—';
                    this.$('statCompleted').textContent = s.tasks_completed ?? '—';
                    this.$('statRate').innerHTML = (s.tasks_completeed_rate ?? '—') + '<small>%</small>';
                    this.$('statAvgTime').textContent = s.tasks_average_completion_time || '—';
                } catch (e) { this.toast(e.message, 'error'); }
            },

            renderTasks() {
                const list = this.$('taskList');
                this.$('countTasks').textContent = this.tasks.length;
                this.$('badgeTasks').textContent = this.tasks.length;
                if (!this.tasks.length) {
                    list.innerHTML = `<div class="empty"><i class="fas fa-inbox"></i><p>Нет задач</p></div>`;
                    return;
                }
                list.innerHTML = this.tasks.map(t => `
                    <div class="item">
                        <div class="item-content">
                            <div class="item-title">
                                ${t.title || 'Без названия'}
                                ${t.completed ? '<span class="pill pill-green">✓ готово</span>' : '<span class="pill pill-purple">○ в работе</span>'}
                            </div>
                            <div class="item-meta">
                                <span><i class="fas fa-user"></i> ${t.author_user_id}</span>
                                ${t.description ? `<span><i class="fas fa-align-left"></i> ${t.description.slice(0, 40)}${t.description.length > 40 ? '…' : ''}</span>` : ''}
                                <span><i class="fas fa-clock"></i> ${new Date(t.created_at).toLocaleDateString('ru')}</span>
                                <span class="pill pill-gray">v${t.version}</span>
                            </div>
                        </div>
                        <div class="item-actions">
                            <button class="btn btn-ghost btn-sm btn-edit-task" data-id="${t.id}"><i class="fas fa-edit"></i></button>
                            <button class="btn btn-ghost btn-sm btn-delete-task" data-id="${t.id}" style="color:#f87171;"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                `).join('');
                list.querySelectorAll('.btn-edit-task').forEach(b => b.onclick = () => this.editTask(+b.dataset.id));
                list.querySelectorAll('.btn-delete-task').forEach(b => b.onclick = () => this.deleteTask(+b.dataset.id));
            },

            renderUsers() {
                const list = this.$('userList');
                this.$('countUsers').textContent = this.users.length;
                this.$('badgeUsers').textContent = this.users.length;
                if (!this.users.length) {
                    list.innerHTML = `<div class="empty"><i class="fas fa-user-slash"></i><p>Нет пользователей</p></div>`;
                    return;
                }
                list.innerHTML = this.users.map(u => `
                    <div class="item">
                        <div class="item-content">
                            <div class="item-title">${u.full_name || 'Без имени'}</div>
                            <div class="item-meta">
                                <span><i class="fas fa-id-badge"></i> #${u.id}</span>
                                ${u.phone_number ? `<span><i class="fas fa-phone"></i> ${u.phone_number}</span>` : '<span class="pill pill-gray">нет телефона</span>'}
                                <span class="pill pill-gray">v${u.version}</span>
                            </div>
                        </div>
                        <div class="item-actions">
                            <button class="btn btn-ghost btn-sm btn-edit-user" data-id="${u.id}"><i class="fas fa-edit"></i></button>
                            <button class="btn btn-ghost btn-sm btn-delete-user" data-id="${u.id}" style="color:#f87171;"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                `).join('');
                list.querySelectorAll('.btn-edit-user').forEach(b => b.onclick = () => this.editUser(+b.dataset.id));
                list.querySelectorAll('.btn-delete-user').forEach(b => b.onclick = () => this.deleteUser(+b.dataset.id));
            },

            updatePagination(type) {
                const prefix = type === 'task' ? 'task' : 'user';
                const page = type === 'task' ? this.taskPage : this.userPage;
                const total = type === 'task' ? this.taskTotal : this.userTotal;
                const limit = type === 'task' ? this.taskLimit : this.userLimit;
                const info = this.$(`${prefix}PaginationInfo`);
                const prevBtn = this.$(`btn${type.charAt(0).toUpperCase() + type.slice(1)}Prev`);
                const nextBtn = this.$(`btn${type.charAt(0).toUpperCase() + type.slice(1)}Next`);
                const totalPages = Math.ceil(total / limit) || 1;
                info.textContent = `Страница ${page} из ${totalPages}`;
                if (prevBtn) prevBtn.disabled = page <= 1;
                if (nextBtn) nextBtn.disabled = page >= totalPages || this[`${type}s`].length < limit;
            },

            goToPage(type, direction) {
                const page = type === 'task' ? this.taskPage : this.userPage;
                const newPage = direction === 'next' ? page + 1 : page - 1;
                if (newPage < 1) return;
                if (type === 'task') { this.taskPage = newPage;
                    this.fetchTasks(); } else { this.userPage = newPage;
                    this.fetchUsers(); }
            },

            async createTask(data) {
                try { await API.createTask(data);
                    this.toast('Задача создана');
                    this.taskPage = 1;
                    await this.fetchTasks(); } catch (e) { this.toast(e.message, 'error'); }
            },
            async updateTask(id, data) {
                try { await API.updateTask(id, data);
                    this.toast('Задача обновлена');
                    await this.fetchTasks(); } catch (e) { this.toast(e.message, 'error'); }
            },
            async deleteTask(id) {
                if (!confirm('Удалить задачу?')) return;
                try { await API.deleteTask(id);
                    this.toast('Задача удалена');
                    await this.fetchTasks(); } catch (e) { this.toast(e.message, 'error'); }
            },
            async createUser(data) {
                try { await API.createUser(data);
                    this.toast('Пользователь создан');
                    this.userPage = 1;
                    await this.fetchUsers(); } catch (e) { this.toast(e.message, 'error'); }
            },
            async updateUser(id, data) {
                try { await API.updateUser(id, data);
                    this.toast('Пользователь обновлен');
                    await this.fetchUsers(); } catch (e) { this.toast(e.message, 'error'); }
            },
            async deleteUser(id) {
                if (!confirm('Удалить пользователя?')) return;
                try { await API.deleteUser(id);
                    this.toast('Пользователь удален');
                    await this.fetchUsers(); } catch (e) { this.toast(e.message, 'error'); }
            },

            modalMode: 'task',
            modalEditId: null,

            openModal(title, html, mode, id = null) {
                this.$('modalTitle').innerHTML = title;
                this.$('modalBody').innerHTML = html;
                this.modalMode = mode;
                this.modalEditId = id;
                this.$('modalOverlay').classList.add('active');
            },
            closeModal() {
                this.$('modalOverlay').classList.remove('active');
                this.modalEditId = null;
            },

            newTask() {
                this.openModal(
                    '<i class="fas fa-plus-circle"></i> Новая задача',
                    `
                        <label>Название</label>
                        <input id="fTitle" value="Задача ${Date.now().toString().slice(-4)}">
                        <label>Описание</label>
                        <textarea id="fDesc"></textarea>
                        <label>ID автора</label>
                        <input id="fAuthor" type="number" value="1">
                    `,
                    'task'
                );
            },
            editTask(id) {
                const t = this.tasks.find(x => x.id === id);
                if (!t) return this.toast('Задача не найдена', 'error');
                this.openModal(
                    `<i class="fas fa-edit"></i> Задача #${id}`,
                    `
                        <label>Название</label>
                        <input id="fTitle" value="${t.title || ''}">
                        <label>Описание</label>
                        <textarea id="fDesc">${t.description || ''}</textarea>
                        <label>Статус</label>
                        <select id="fCompleted"><option value="false">В работе</option><option value="true" ${t.completed ? 'selected' : ''}>Готово</option></select>
                        <label>ID автора</label>
                        <input id="fAuthor" type="number" value="${t.author_user_id}">
                    `,
                    'task',
                    id
                );
            },
            newUser() {
                this.openModal(
                    '<i class="fas fa-user-plus"></i> Новый пользователь',
                    `
                        <label>Полное имя</label>
                        <input id="fName" value="User ${Date.now().toString().slice(-4)}">
                        <label>Телефон</label>
                        <input id="fPhone" placeholder="+79001234567">
                    `,
                    'user'
                );
            },
            editUser(id) {
                const u = this.users.find(x => x.id === id);
                if (!u) return this.toast('Пользователь не найден', 'error');
                this.openModal(
                    `<i class="fas fa-user-edit"></i> Пользователь #${id}`,
                    `
                        <label>Полное имя</label>
                        <input id="fName" value="${u.full_name || ''}">
                        <label>Телефон</label>
                        <input id="fPhone" value="${u.phone_number || ''}">
                    `,
                    'user',
                    id
                );
            },

            async handleSubmit(e) {
                e.preventDefault();
                const mode = this.modalMode;
                const id = this.modalEditId;
                if (mode === 'task') {
                    const title = this.$('fTitle')?.value.trim();
                    const desc = this.$('fDesc')?.value.trim() || null;
                    const author = +this.$('fAuthor')?.value;
                    const completed = this.$('fCompleted')?.value === 'true';
                    if (!title) return this.toast('Название обязательно', 'error');
                    if (!author) return this.toast('ID автора обязателен', 'error');
                    if (id) {
                        const data = { title, completed };
                        if (desc !== null) data.description = desc;
                        await this.updateTask(id, data);
                    } else {
                        await this.createTask({ title, description: desc, author_user_id: author });
                    }
                    this.closeModal();
                } else if (mode === 'user') {
                    const name = this.$('fName')?.value.trim();
                    const phone = this.$('fPhone')?.value.trim() || null;
                    if (!name) return this.toast('Имя обязательно', 'error');
                    if (id) {
                        const data = { full_name: name };
                        if (phone !== null) data.phone_number = phone;
                        await this.updateUser(id, data);
                    } else {
                        await this.createUser({ full_name: name, phone_number: phone });
                    }
                    this.closeModal();
                }
            },

            init() {
                this.$$('.tab').forEach(tab => {
                    tab.onclick = () => {
                        this.$$('.tab').forEach(t => t.classList.remove('active'));
                        tab.classList.add('active');
                        const name = tab.dataset.tab;
                        this.$$('.panel').forEach(p => p.classList.remove('active'));
                        this.$(`panel-${name}`).classList.add('active');
                        if (name === 'tasks') { this.taskPage = 1;
                            this.fetchTasks(); } else if (name === 'users') { this.userPage = 1;
                            this.fetchUsers(); } else if (name === 'stats') {
                            this.fetchStats(this.$('statFrom').value, this.$('statTo').value); }
                    };
                });

                this.$('btnCreateTask').onclick = () => this.newTask();
                this.$('btnCreateUser').onclick = () => this.newUser();
                this.$('btnRefresh').onclick = () => {
                    this.taskPage = 1;
                    this.userPage = 1;
                    this.fetchTasks();
                    this.fetchUsers();
                    this.fetchStats(this.$('statFrom').value, this.$('statTo').value);
                    this.toast('Обновлено', 'info');
                };
                this.$('btnApplyTaskFilter').onclick = () => { this.taskPage = 1;
                    this.fetchTasks(); };
                this.$('btnRefreshTasks').onclick = () => { this.taskPage = 1;
                    this.fetchTasks(); };
                this.$('taskLimit').onchange = () => { this.taskPage = 1;
                    this.fetchTasks(); };
                this.$('btnApplyUserFilter').onclick = () => { this.userPage = 1;
                    this.fetchUsers(); };
                this.$('btnRefreshUsers').onclick = () => { this.userPage = 1;
                    this.fetchUsers(); };
                this.$('userLimit').onchange = () => { this.userPage = 1;
                    this.fetchUsers(); };
                this.$('btnTaskPrev').onclick = () => this.goToPage('task', 'prev');
                this.$('btnTaskNext').onclick = () => this.goToPage('task', 'next');
                this.$('btnUserPrev').onclick = () => this.goToPage('user', 'prev');
                this.$('btnUserNext').onclick = () => this.goToPage('user', 'next');
                this.$('btnApplyStats').onclick = () => this.fetchStats(this.$('statFrom').value, this.$('statTo')
                .value);
                this.$('btnRefreshStats').onclick = () => this.fetchStats(this.$('statFrom').value, this.$('statTo')
                    .value);

                this.$('btnModalCancel').onclick = () => this.closeModal();
                this.$('modalOverlay').onclick = (e) => { if (e.target === this.$('modalOverlay')) this.closeModal(); };
                this.$('modalForm').onsubmit = (e) => this.handleSubmit(e);

                document.onkeydown = (e) => {
                    if (e.key === 'Escape') this.closeModal();
                    if ((e.ctrlKey || e.metaKey) && e.key === 'r') { e.preventDefault();
                        this.$('btnRefresh').click(); }
                };

                this.fetchTasks();
                this.fetchUsers();
                this.fetchStats();
            }
        };

        document.addEventListener('DOMContentLoaded', () => App.init());
    </script>
</body>
</html>
